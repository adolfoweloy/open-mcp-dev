specs:
  - id: root__initial_scope
    domain: root
    feature: initial_scope
    description: Full-stack MCP chat client with OpenAI/Ollama support, MCP server management, OAuth2, ChatGPT Apps SDK iframe bridge, and localStorage conversation persistence
    status: done

  - id: oauth_authorisation__dynamic_registration_oauth_flow
    domain: oauth_authorisation
    feature: dynamic_registration_oauth_flow
    description: RFC 7591 dynamic client registration + OAuth2 Authorization Code + PKCE flow for HTTP MCP servers; in-memory tokens, per-server auth lock, banner-based auto-trigger, server-side token exchange
    status: done

  - id: bugs__missing-config-unfriendly-error
    domain: bugs
    feature: missing-config-unfriendly-error
    description: Unfriendly error when config.yaml is missing on fresh checkout
    status: done 

  - id: bugs__example-config-servers-not-commented
    domain: bugs
    feature: example-config-servers-not-commented
    description: Example MCP servers in config.example.yaml are not commented out
    status: done 

  - id: bugs__config-not-found-wrong-cwd
    domain: bugs
    feature: config-not-found-wrong-cwd
    description: loadConfig() fails when CWD is not the project root (e.g. npm run dev:server)
    status: done 

  - id: bugs__model-change-infinite-render-loop
    domain: bugs
    feature: model-change-infinite-render-loop
    description: Infinite render loop when switching or creating conversations
    status: done 

  - id: bugs__ollama-chat-404-base-url
    domain: bugs
    feature: ollama-chat-404-base-url
    description: Ollama chat returns 404 due to base_url missing /api suffix normalisation
    status: done

  - id: chat__chatmanagement
    domain: chat
    feature: chatmanagement
    description: Fix conversation isolation (shared message store bug) and add rename/delete actions via per-item meatball menu
    status: done

  - id: chat__chat_options
    domain: chat
    feature: chat_options
    description: Rename (modal dialog) and delete (immediate) actions for conversations via per-item meatball menu; supersedes chat__chatmanagement
    status: done

  - id: root__server_settings_ui
    domain: root
    feature: server_settings_ui
    description: Settings drawer (gear icon, bottom-left sidebar) for adding, editing, and deleting MCP servers from the UI; writes to config.yaml, hot-reloads connections via MCPClientManager CRUD methods
    status: done

  - id: servers__management
    domain: servers
    feature: management
    description: Separate sidebar (per-chat enable/disable toggle) from settings (connect/disconnect/CRUD); replace gear icon with "Settings" link; block tool calls for disabled servers
    status: done

  - id: chat__debug
    domain: chat
    feature: debug
    description: Right-side debug panel with full LLM agentic loop visibility (per-step tracking, tool decisions, durations), correlated event grouping, step separators, directional indicators, quick filters, lightweight toggle tab, and min-chat-width protection
    status: done

  - id: bugs__chat-autoscroll-override
    domain: bugs
    feature: chat-autoscroll-override
    description: Chat auto-scroll prevents manual scrolling during response generation
    status: done

  - id: bugs__iframe-missing-border
    domain: bugs
    feature: iframe-missing-border
    description: MCP resource iframe has no visible border to delimit widget boundaries
    status: done

  - id: bugs__server-toggle-no-effect
    domain: bugs
    feature: server-toggle-no-effect
    description: Toggling a connected MCP server checkbox has no visible effect on state
    status: done

  - id: bugs__debug-panel-ux
    domain: bugs
    feature: debug-panel-ux
    description: Debug panel scroll breaks when expanding log entries; poor payload styling and no expand/collapse affordance
    status: wip
