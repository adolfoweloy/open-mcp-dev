# MCP Chat Configuration Example
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored and will never be committed.

llm:
  openai:
    api_key: "sk-..."          # Required: your OpenAI API key
    default_model: "gpt-4o"   # Optional: default model to select
    system_prompt: |           # Optional: system prompt for OpenAI models
      You are a helpful assistant.

  ollama:
    base_url: "http://localhost:11434"  # Optional: Ollama base URL (default: http://localhost:11434)
    system_prompt: |                    # Optional: system prompt for Ollama models
      You are a helpful assistant.

mcp_servers:
  # Example: stdio MCP server
  # my-stdio-server:
  #   type: stdio
  #   command: "npx"
  #   args: ["-y", "@some/mcp-server"]   # Optional: command arguments
  #   env:                                # Optional: environment variables
  #     MY_VAR: "value"
  #   timeout: 30000                      # Optional: connection timeout in ms

  # Example: HTTP MCP server (no auth)
  # my-http-server:
  #   type: http
  #   url: "https://example.com/mcp"
  #   prefer_sse: false                   # Optional: prefer SSE transport over StreamableHTTP
  #   timeout: 30000                      # Optional: connection timeout in ms

  # Example: HTTP MCP server with OAuth2
  # my-oauth-server:
  #   type: http
  #   url: "https://example.com/mcp"
  #   oauth: true                         # Required: enable OAuth2 PKCE flow
  #   client_id: "your-client-id"        # Optional: pre-registered OAuth client ID
  #   client_secret: "your-client-secret" # Optional: OAuth client secret
  #   access_token: "..."                 # Optional: pre-configured access token
  #   refresh_token: "..."                # Optional: pre-configured refresh token
  #   prefer_sse: false                   # Optional: prefer SSE transport over StreamableHTTP
  #   timeout: 30000                      # Optional: connection timeout in ms
